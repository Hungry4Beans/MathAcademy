<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathAcademy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --accent:#6c63ff;--accent2:#ff6584;--accent3:#43e8b0;--accent4:#ffd166;
  --text:#f0eeff;--text2:#a09ec0;--text3:#6a68a0;
  --border:#2a2a40;--border2:#3a3a58;
  --card-radius:16px;--btn-radius:10px;
  --font-display:'DM Serif Display',serif;
  --font-body:'Plus Jakarta Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100vh}
nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:var(--font-display);font-size:22px;color:var(--accent);letter-spacing:-0.5px;cursor:pointer}
.nav-logo span{color:var(--accent3)}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:none;border:none;color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;transition:all 0.2s}
.nav-tab:hover{background:var(--bg3);color:var(--text)}
.nav-tab.active{background:var(--bg3);color:var(--accent);border:1px solid var(--border2)}
.nav-right{display:flex;align-items:center;gap:10px}
.xp-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--accent4);font-weight:600;font-family:var(--font-mono);cursor:pointer;transition:all 0.2s}
.xp-badge:hover{border-color:var(--accent4)}
.rank-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer}
main{flex:1;padding:28px 24px;max-width:1100px;margin:0 auto;width:100%}

/* XP LEVEL BAR */
.xp-bar-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px}
.rank-icon{font-size:32px;line-height:1}
.xp-bar-info{flex:1}
.xp-bar-top{display:flex;justify-content:space-between;margin-bottom:6px}
.rank-name{font-weight:700;font-size:14px}
.xp-label{font-size:12px;color:var(--text3);font-family:var(--font-mono)}
.xp-bar-track{height:8px;background:var(--bg4);border-radius:8px;overflow:hidden}
.xp-bar-fill{height:100%;border-radius:8px;transition:width 0.8s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),var(--accent3))}
.xp-next{font-size:11px;color:var(--text3);margin-top:4px}

/* HOME */
.hero{text-align:center;padding:36px 0 28px}
.hero h1{font-family:var(--font-display);font-size:48px;line-height:1.1;margin-bottom:10px}
.hero h1 em{color:var(--accent);font-style:italic}
.hero p{color:var(--text2);font-size:16px}
.subject-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:28px}
.subject-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:22px 18px;cursor:pointer;transition:all 0.2s;text-align:left;position:relative;overflow:hidden}
.subject-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.subject-card.alg::before{background:var(--accent)}
.subject-card.geo::before{background:var(--accent2)}
.subject-card.trig::before{background:var(--accent3)}
.subject-card.precalc::before{background:var(--accent4)}
.subject-card.calc::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.subject-card:hover{transform:translateY(-2px)}
.subject-card:hover.alg{border-color:var(--accent)}
.subject-card:hover.geo{border-color:var(--accent2)}
.subject-card:hover.trig{border-color:var(--accent3)}
.subject-card:hover.precalc{border-color:var(--accent4)}
.subject-card:hover.calc{border-color:var(--accent)}
.subject-icon{font-size:28px;margin-bottom:10px}
.subject-title{font-weight:700;font-size:15px;margin-bottom:4px}
.subject-desc{color:var(--text2);font-size:12px;line-height:1.5;margin-bottom:12px}
.subject-progress{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:6px}
.subject-progress-bar{height:100%;border-radius:4px;transition:width 0.5s}
.subject-card.alg .subject-progress-bar{background:var(--accent)}
.subject-card.geo .subject-progress-bar{background:var(--accent2)}
.subject-card.trig .subject-progress-bar{background:var(--accent3)}
.subject-card.precalc .subject-progress-bar{background:var(--accent4)}
.subject-card.calc .subject-progress-bar{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.subject-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-family:var(--font-mono);font-size:26px;font-weight:500;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.stat-card.xp .stat-num{color:var(--accent4)}
.stat-card.tests .stat-num{color:var(--accent3)}
.stat-card.acc .stat-num{color:var(--accent)}
.stat-card.rank .stat-num{font-size:22px}

/* BACK BTN */
.back-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:7px 16px;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:13px;margin-bottom:20px;transition:all 0.2s}
.back-btn:hover{background:var(--bg3);color:var(--text)}
.topic-header{margin-bottom:24px}
.topic-header h2{font-family:var(--font-display);font-size:34px;margin-bottom:6px}
.topic-header p{color:var(--text2);font-size:15px}
.section-title{font-family:var(--font-display);font-size:20px;margin-bottom:12px;color:var(--text2)}
.lessons-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.lesson-row{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.2s}
.lesson-row:hover{border-color:var(--border2);background:var(--bg3)}
.lesson-num{font-family:var(--font-mono);font-size:12px;color:var(--text3);min-width:28px}
.lesson-info{flex:1}
.lesson-title{font-size:14px;font-weight:600;margin-bottom:2px}
.lesson-meta{font-size:12px;color:var(--text3)}
.lesson-status{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
.lesson-status.done{background:rgba(67,232,176,0.1);color:var(--accent3);border:1px solid rgba(67,232,176,0.2)}
.lesson-status.available{background:rgba(108,99,255,0.1);color:var(--accent);border:1px solid rgba(108,99,255,0.2)}

/* ===== LESSON VIEWER ===== */
.lesson-viewer{max-width:740px;margin:0 auto}
.lesson-viewer-header{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:20px}
.lesson-viewer-header h2{font-family:var(--font-display);font-size:28px;margin-bottom:4px}
.lesson-viewer-header p{color:var(--text2);font-size:14px}
.lesson-progress-bar{height:4px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:12px}
.lesson-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:4px;transition:width 0.4s}
.lesson-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lesson-section h3{font-family:var(--font-display);font-size:22px;margin-bottom:14px;color:var(--accent4)}
.lesson-section p{color:var(--text2);font-size:15px;line-height:1.8;margin-bottom:12px}
.lesson-section p:last-child{margin-bottom:0}
.lesson-section strong{color:var(--text);font-weight:600}
.math-block{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:16px 20px;margin:14px 0;font-family:var(--font-mono);font-size:15px;color:var(--accent3);line-height:1.8;white-space:pre-wrap}
.math-block .comment{color:var(--text3);font-style:italic}
.example-box{background:rgba(108,99,255,0.06);border:1px solid rgba(108,99,255,0.2);border-radius:10px;padding:16px 20px;margin:14px 0}
.example-box .ex-label{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.example-box p{color:var(--text);font-size:14px;line-height:1.7;margin-bottom:6px}
.tip-box{background:rgba(67,232,176,0.06);border:1px solid rgba(67,232,176,0.2);border-radius:10px;padding:14px 18px;margin:14px 0;display:flex;gap:12px}
.tip-box .tip-icon{font-size:18px;flex-shrink:0;margin-top:2px}
.tip-box p{color:var(--text2);font-size:14px;line-height:1.6;margin:0}
.warning-box{background:rgba(255,209,102,0.06);border:1px solid rgba(255,209,102,0.2);border-radius:10px;padding:14px 18px;margin:14px 0;display:flex;gap:12px}
.warning-box .warn-icon{font-size:18px;flex-shrink:0}
.warning-box p{color:var(--text2);font-size:14px;line-height:1.6;margin:0}
.steps-list{margin:12px 0;display:flex;flex-direction:column;gap:10px}
.step-item{display:flex;gap:12px;align-items:flex-start}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.step-body{flex:1;font-size:14px;color:var(--text2);line-height:1.6}
.step-body strong{color:var(--text)}

/* QUIZ in lesson */
.lesson-quiz{background:var(--bg2);border:1px solid var(--accent);border-radius:14px;padding:24px;margin-bottom:16px}
.lesson-quiz h3{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.lesson-quiz .q-text{font-size:17px;font-weight:500;margin:12px 0 16px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.quiz-opt{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:11px 16px;text-align:left;cursor:pointer;color:var(--text);font-family:var(--font-body);font-size:14px;transition:all 0.2s;display:flex;align-items:center;gap:10px}
.quiz-opt:hover:not(:disabled){border-color:var(--accent);background:rgba(108,99,255,0.07)}
.quiz-opt.selected{border-color:var(--accent);background:rgba(108,99,255,0.12)}
.quiz-opt.correct{border-color:var(--accent3)!important;background:rgba(67,232,176,0.1)!important;color:var(--accent3)!important}
.quiz-opt.wrong{border-color:var(--accent2)!important;background:rgba(255,101,132,0.1)!important;color:var(--accent2)!important}
.quiz-feedback{padding:12px 16px;border-radius:9px;font-size:14px;margin-bottom:12px}
.quiz-feedback.correct{background:rgba(67,232,176,0.08);border:1px solid rgba(67,232,176,0.2);color:var(--accent3)}
.quiz-feedback.wrong{background:rgba(255,101,132,0.08);border:1px solid rgba(255,101,132,0.2);color:var(--accent2)}
.nav-btns{display:flex;gap:10px;margin-top:4px}
.btn-primary{background:var(--accent);border:none;color:white;padding:11px 24px;border-radius:var(--btn-radius);cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:600;transition:all 0.2s}
.btn-primary:hover{background:#7c74ff}
.btn-primary:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.btn-secondary{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:11px 24px;border-radius:var(--btn-radius);cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:500;transition:all 0.2s}
.btn-secondary:hover{background:var(--bg4);color:var(--text)}
.lesson-complete{text-align:center;padding:32px 20px;background:var(--bg2);border:1px solid var(--accent3);border-radius:14px}
.lesson-complete h2{font-family:var(--font-display);font-size:32px;color:var(--accent3);margin-bottom:8px}
.lesson-complete p{color:var(--text2);margin-bottom:20px}
.xp-gain{font-family:var(--font-mono);font-size:28px;color:var(--accent4);font-weight:500;margin:10px 0}

/* TEST */
.test-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:28px;max-width:680px;margin:0 auto}
.test-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.test-progress{font-size:13px;color:var(--text3);font-family:var(--font-mono)}
.timer{font-family:var(--font-mono);font-size:13px;color:var(--accent4);background:var(--bg3);padding:4px 12px;border-radius:20px}
.question-text{font-size:18px;font-weight:500;margin-bottom:20px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.option-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:13px 18px;text-align:left;cursor:pointer;color:var(--text);font-family:var(--font-body);font-size:14px;transition:all 0.2s;display:flex;align-items:center;gap:10px}
.option-btn:hover{border-color:var(--accent);background:rgba(108,99,255,0.05)}
.option-btn.selected{border-color:var(--accent);background:rgba(108,99,255,0.1);color:var(--accent)}
.option-btn.correct{border-color:var(--accent3);background:rgba(67,232,176,0.1);color:var(--accent3)}
.option-btn.wrong{border-color:var(--accent2);background:rgba(255,101,132,0.1);color:var(--accent2)}
.opt-label{width:26px;height:26px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--font-mono);flex-shrink:0}
.submit-btn{background:var(--accent);border:none;color:white;padding:12px 28px;border-radius:var(--btn-radius);cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:600;transition:all 0.2s;width:100%}
.submit-btn:hover{background:#7c74ff}
.submit-btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.feedback{padding:14px 18px;border-radius:10px;margin-bottom:14px;font-size:14px;line-height:1.6}
.feedback.correct{background:rgba(67,232,176,0.08);border:1px solid rgba(67,232,176,0.2);color:var(--accent3)}
.feedback.wrong{background:rgba(255,101,132,0.08);border:1px solid rgba(255,101,132,0.2);color:var(--accent2)}
.results{text-align:center;padding:16px 0}
.results-score{font-family:var(--font-display);font-size:72px;margin:8px 0}
.results-grade{font-size:18px;color:var(--text2);margin-bottom:20px}
.results-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.result-item{background:var(--bg3);border-radius:10px;padding:14px;text-align:center}
.result-val{font-family:var(--font-mono);font-size:22px;font-weight:500;margin-bottom:4px}
.result-lbl{font-size:11px;color:var(--text3)}

/* LOG */
.log-list{display:flex;flex-direction:column;gap:8px}
.log-entry{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.log-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.log-icon.test{background:rgba(108,99,255,0.15)}
.log-icon.lesson{background:rgba(67,232,176,0.1)}
.log-body{flex:1}
.log-title{font-size:14px;font-weight:500;margin-bottom:2px}
.log-time{font-size:12px;color:var(--text3)}
.log-score{font-family:var(--font-mono);font-size:14px;font-weight:500}
.log-score.good{color:var(--accent3)}
.log-score.mid{color:var(--accent4)}
.log-score.bad{color:var(--accent2)}
.empty-log{text-align:center;padding:48px;color:var(--text3);font-size:15px}
.btn-danger{background:rgba(255,101,132,0.1);border:1px solid rgba(255,101,132,0.3);color:var(--accent2);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;transition:all 0.2s}
.btn-danger:hover{background:rgba(255,101,132,0.2)}

/* AI TUTOR */
.ai-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:20px;margin-top:16px}
.ai-box-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:var(--text2);font-weight:600}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.ai-response{font-size:14px;color:var(--text2);line-height:1.7;min-height:50px}
.ai-input-row{display:flex;gap:8px;margin-top:12px}
.ai-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;color:var(--text);font-family:var(--font-body);font-size:13px}
.ai-input::placeholder{color:var(--text3)}
.ai-input:focus{outline:none;border-color:var(--accent)}
.ai-send{background:var(--accent);border:none;color:white;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}

/* RANKS PAGE */
.ranks-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.rank-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;transition:all 0.2s}
.rank-card.current{border-color:var(--accent4);background:rgba(255,209,102,0.04)}
.rank-card.unlocked{border-color:var(--border2)}
.rank-card.locked{opacity:0.4}
.rank-emoji{font-size:36px;margin-bottom:8px}
.rank-title{font-weight:700;font-size:14px;margin-bottom:4px}
.rank-req{font-size:12px;color:var(--text3)}
.rank-current-badge{font-size:11px;color:var(--accent4);background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.2);padding:2px 8px;border-radius:20px;display:inline-block;margin-top:6px}

.loading{display:inline-flex;gap:4px;align-items:center}
.loading span{width:5px;height:5px;border-radius:50%;background:var(--accent3);animation:bounce 1.2s infinite}
.loading span:nth-child(2){animation-delay:0.2s}
.loading span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* XP POPUP */
.xp-popup{position:fixed;top:70px;right:20px;background:var(--bg2);border:1px solid var(--accent4);border-radius:12px;padding:10px 18px;font-family:var(--font-mono);font-size:15px;color:var(--accent4);font-weight:600;z-index:999;animation:popIn 0.3s ease,fadeOut 0.4s ease 1.8s forwards;pointer-events:none}
@keyframes popIn{from{transform:translateY(-10px) scale(0.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-8px)}}
</style>
</head>
<body>
<div id="app">
<nav>
  <div class="nav-logo" onclick="goHome()">Math<span>Academy</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-home" onclick="showPage('home')">Subjects</button>
    <button class="nav-tab" id="tab-ranks" onclick="showPage('ranks')">Ranks</button>
    <button class="nav-tab" id="tab-log" onclick="showPage('log')">Activity Log</button>
  </div>
  <div class="nav-right">
    <div class="rank-badge" id="rank-display" onclick="showPage('ranks')">🌱 Seedling</div>
    <div class="xp-badge" id="xp-display" onclick="showPage('ranks')">⚡ 0 XP</div>
  </div>
</nav>
<main id="main-content"></main>
</div>

<script>
// ============================================================
// RANKS SYSTEM
// ============================================================
const RANKS = [
  {name:'Seedling',icon:'🌱',min:0,max:99,color:'#43e8b0'},
  {name:'Apprentice',icon:'📐',min:100,max:299,color:'#6c63ff'},
  {name:'Scholar',icon:'📚',min:300,max:599,color:'#ffd166'},
  {name:'Analyst',icon:'🔬',min:600,max:999,color:'#ff6584'},

let state={

function loadState(){try{const s=localStorage.getItem('mathacademy2_state');if(s)state={...state,...JSON.parse(s)};}catch(e){}}
function saveState(){try{localStorage.setItem('mathacademy2_state',JSON.stringify(state));}catch(e){}}

function showXpPopup(amount){
  const el=document.createElement('div');
  el.className='xp-popup';
  el.textContent='+'+amount+' XP!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2400);
}
function addLog(type,title,score,xp){
  const now=new Date();
  state.log.unshift({type,title,score,xp,time:now.toISOString()});
  if(state.log.length>60)state.log=state.log.slice(0,60);
  const oldRank=getRank(state.xp);
  state.xp=(state.xp||0)+xp;
  const newRank=getRank(state.xp);
  saveState();
  updateNavXP();
  showXpPopup(xp);
  if(oldRank.name!==newRank.name){
    setTimeout(()=>showRankUp(newRank),600);
  }
}
function showRankUp(rank){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:var(--bg2);border:2px solid var(--accent4);border-radius:20px;padding:32px 48px;text-align:center;z-index:9999;animation:popIn 0.4s ease forwards';
  el.innerHTML=`<div style="font-size:56px;margin-bottom:8px">${rank.icon}</div><div style="font-family:var(--font-display);font-size:28px;color:var(--accent4);margin-bottom:4px">Rank Up!</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">${rank.name}</div><div style="color:var(--text2);font-size:13px">Keep studying to reach the next rank!</div>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
function updateNavXP(){
  const rank=getRank(state.xp);
  document.getElementById('xp-display').textContent='⚡ '+state.xp+' XP';
  document.getElementById('rank-display').textContent=rank.icon+' '+rank.name;
  document.getElementById('rank-display').style.color=rank.color;
}
function fmtTime(iso){
  if(!iso)return '';
  const d=new Date(iso),now=new Date(),diff=now-d;
  if(diff<60000)return 'just now';
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString();
}
function showPage(p){
  ['home','ranks','log'].forEach(id=>{
    document.getElementById('tab-'+id)?.classList.toggle('active',id===p);
  });
  state.page=p;state.subject=null;state.topic=null;state.lessonView=null;state.test=null;state.testState=null;
  render();
}
function goHome(){state.page='home';state.subject=null;state.topic=null;state.lessonView=null;state.test=null;state.testState=null;render();}
function getProgress(id){return state.progress[id]||{lessons:{}};}
function getSubjectProgress(sub){
  let total=0,done=0;
  sub.topics.forEach(t=>{total+=t.lessons.length;const p=getProgress(t.id);done+=Object.keys(p.lessons||{}).length;});
  return total>0?Math.round(done/total*100):0;
}

function render(){
  const el=document.getElementById('main-content');
  if(state.page==='log'){el.innerHTML=renderLog();return;}
  if(state.page==='ranks'){el.innerHTML=renderRanks();return;}
  if(state.lessonView){el.innerHTML=renderLessonViewer();return;}
  if(state.test&&state.testState){el.innerHTML=renderTest();return;}
  if(state.subject){el.innerHTML=renderSubject();return;}
  el.innerHTML=renderHome();
}

function renderHome(){
  const testsDone=state.log.filter(l=>l.type==='test').length;
  const accScores=state.log.filter(l=>l.type==='test'&&l.score!=null).map(l=>l.score);
  const avgAcc=accScores.length?Math.round(accScores.reduce((a,b)=>a+b,0)/accScores.length):0;
  const rank=getRank(state.xp);
  const nextRank=getNextRank(state.xp);
  const xpIntoLevel=state.xp-rank.min;
  const levelSize=(rank.max===Infinity?1000:rank.max-rank.min)+1;
  const pct=Math.min(100,Math.round(xpIntoLevel/levelSize*100));
  return `
  <div class="xp-bar-wrap">
    <div class="rank-icon">${rank.icon}</div>
    <div class="xp-bar-info">
      <div class="xp-bar-top">
        <div class="rank-name" style="color:${rank.color}">${rank.name}</div>
        <div class="xp-label">${state.xp} XP total</div>
      </div>
      <div class="xp-bar-track"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
      <div class="xp-next">${nextRank?`${nextRank.xpNeeded||nextRank.min - state.xp} XP to ${nextRank.icon} ${nextRank.name}`:'🏆 Maximum rank achieved!'}</div>

  <div class="hero"><h1>Master <em>High School</em> Math</h1><p>Interactive lessons, quizzes, and tests — from Algebra to Calculus</p></div>

    <div class="stat-card acc"><div class="stat-num">${avgAcc}%</div><div class="stat-label">Avg Score</div></div>
    <div class="stat-card rank"><div class="stat-num">${rank.icon}</div><div class="stat-label">${rank.name}</div></div>

}

function openLesson(subId, topId, lesIdx){
  const sub=SUBJECTS.find(s=>s.id===subId);
  const topic=sub.topics.find(t=>t.id===topId);
  const lesTitle=topic.lessons[lesIdx];
  const contentKey=`${subId}-${topId}-${lesIdx}`;
  const content=LESSON_CONTENT[contentKey]||getFallbackLesson(subId,topId,lesIdx,lesTitle,topic.title);
  state.lessonView={subId,topId,lesIdx,lesTitle,topTitle:topic.title,content,sectionIdx:0,quizAnswered:false,quizSelected:null,quizRevealed:false};
  render();
}

function renderLessonViewer(){
  const lv=state.lessonView;
  const {content,sectionIdx}=lv;
  const sections=content.sections;
  const totalSections=sections.length;
  const pct=Math.round((sectionIdx/totalSections)*100);
  const p=getProgress(lv.topId);
  const isDone=!!(p.lessons||{})[lv.lesIdx];
  let sectionsHtml='';
  // Show sections up to current
  for(let i=0;i<=Math.min(sectionIdx,sections.length-1);i++){
    sectionsHtml+=renderSection(sections[i],i,i===sectionIdx,lv);
  }
  const isLast=sectionIdx>=sections.length-1;
  const currentSec=sections[sectionIdx];
  const isQuiz=currentSec&&currentSec.type==='quiz';
  let navHtml='';
  if(isQuiz){
    navHtml=`<div class="nav-btns" style="margin-top:4px">
      ${sectionIdx>0?`<button class="btn-secondary" onclick="lessonNav(-1)">← Previous</button>`:''}
      ${lv.quizRevealed?(isLast?`<button class="btn-primary" onclick="completeLesson()">Complete Lesson ✓</button>`:`<button class="btn-primary" onclick="lessonNav(1)">Next →</button>`):''}
    </div>`;
  } else {
    navHtml=`<div class="nav-btns" style="margin-top:16px">
      ${sectionIdx>0?`<button class="btn-secondary" onclick="lessonNav(-1)">← Previous</button>`:''}
      ${isLast?`<button class="btn-primary" onclick="completeLesson()">Complete Lesson ✓</button>`:`<button class="btn-primary" onclick="lessonNav(1)">Continue →</button>`}
    </div>`;
  }
  const sub=SUBJECTS.find(s=>s.id===lv.subId);
  return `
  <button class="back-btn" onclick="backToSubject()">← Back to ${sub?sub.title:'Subject'}</button>
  <div class="lesson-viewer">
    <div class="lesson-viewer-header">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">${lv.topTitle}</div>
      <h2>${lv.lesTitle}</h2>
      <div class="lesson-progress-bar"><div class="lesson-progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">Section ${sectionIdx+1} of ${totalSections}</div>
    </div>
    ${sectionsHtml}
    ${navHtml}
    <div class="ai-box" style="margin-top:24px">
      <div class="ai-box-header"><div class="ai-dot"></div>AI Tutor — Ask about "${lv.lesTitle}"</div>
      <div class="ai-response" id="ai-resp">Have a question about this lesson? Ask me anything — I can explain it differently, give more examples, or work through problems with you.</div>
      <div class="ai-input-row">
        <input class="ai-input" id="ai-q" placeholder='e.g. Can you give me another example of ${lv.lesTitle}?' onkeydown="if(event.key==='Enter')askAILesson()">
        <button class="ai-send" onclick="askAILesson()">Ask ↗</button>
      </div>
    </div>
  </div>`;
}

function renderSection(sec,idx,isCurrent,lv){
  const fadeClass=isCurrent?'lesson-section':'lesson-section';
  switch(sec.type){
    case'text':return`<div class="${fadeClass}"><h3>${sec.h3||''}</h3><p>${(sec.body||'').replace(/\n/g,'</p><p>').replace(/<p><\/p>/g,'')}</p></div>`;
    case'math':return`<div class="${fadeClass}"><div class="math-block">${escHtml(sec.content)}</div></div>`;
    case'example':return`<div class="${fadeClass}"><div class="example-box"><div class="ex-label">${sec.label||'Example'}</div><p>${(sec.body||'').replace(/\n/g,'</p><p>')}</p></div></div>`;
    case'tip':return`<div class="${fadeClass}"><div class="tip-box"><div class="tip-icon">💡</div><p>${sec.body}</p></div></div>`;
    case'warning':return`<div class="${fadeClass}"><div class="warning-box"><div class="warn-icon">⚠️</div><p>${sec.body}</p></div></div>`;
    case'steps':return`<div class="${fadeClass}"><h3 style="font-family:var(--font-display);font-size:18px;margin-bottom:12px;color:var(--accent4)">${sec.title||'Steps'}</h3><div class="steps-list">${(sec.steps||[]).map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div class="step-body">${s}</div></div>`).join('')}</div></div>`;
    case'quiz':return renderLessonQuiz(sec,lv);
    default:return`<div class="${fadeClass}"><p>${sec.body||''}</p></div>`;
  }
}

function renderLessonQuiz(sec,lv){
  const labels=['A','B','C','D'];
  return`<div class="lesson-quiz">
    <h3>✏️ Quick Check</h3>
    <div class="q-text">${sec.q}</div>
    <div class="quiz-opts">
      ${sec.opts.map((o,i)=>{
        let cls='quiz-opt';
        if(lv.quizRevealed){
          if(i===sec.ans)cls+=' correct';
          else if(i===lv.quizSelected&&i!==sec.ans)cls+=' wrong';
        } else if(i===lv.quizSelected)cls+=' selected';
        return`<button class="${cls}" onclick="selectQuizOpt(${i})" ${lv.quizRevealed?'disabled':''}><span style="width:22px;height:22px;border-radius:50%;background:var(--bg4);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-right:4px">${labels[i]}</span>${o}</button>`;
      }).join('')}
    </div>
    ${lv.quizRevealed?`<div class="quiz-feedback ${lv.quizSelected===sec.ans?'correct':'wrong'}">${lv.quizSelected===sec.ans?'✓ Correct! ':'✗ Not quite. '}${sec.exp}</div>`:`<button class="btn-primary" onclick="submitQuizOpt()" ${lv.quizSelected===null?'disabled':''} style="margin-top:4px">Check Answer</button>`}
  </div>`;
}

function selectQuizOpt(i){if(!state.lessonView||state.lessonView.quizRevealed)return;state.lessonView.quizSelected=i;render();}
function submitQuizOpt(){
  const lv=state.lessonView;
  if(!lv||lv.quizSelected===null)return;
  lv.quizRevealed=true;
  const sec=lv.content.sections[lv.sectionIdx];
  const correct=lv.quizSelected===sec.ans;
  if(correct){addLog('lesson','Quiz correct: '+lv.lesTitle,null,5);}
  render();
}
function lessonNav(dir){
  const lv=state.lessonView;
  if(!lv)return;
  lv.sectionIdx+=dir;
  lv.quizSelected=null;
  lv.quizRevealed=false;
  render();
  window.scrollTo(0,0);
}
function completeLesson(){
  const lv=state.lessonView;
  if(!lv)return;
  if(!state.progress[lv.topId])state.progress[lv.topId]={lessons:{}};
  const alreadyDone=!!state.progress[lv.topId].lessons[lv.lesIdx];
  state.progress[lv.topId].lessons[lv.lesIdx]=true;
  const sub=SUBJECTS.find(s=>s.id===lv.subId);
  const topic=sub.topics.find(t=>t.id===lv.topId);
  const xpEarned=alreadyDone?0:Math.round(topic.xp/topic.lessons.length);
  if(!alreadyDone)addLog('lesson','Completed: '+lv.lesTitle,null,xpEarned);
  saveState();
  // Show completion screen
  const el=document.getElementById('main-content');
  el.innerHTML=`<button class="back-btn" onclick="backToSubject()">← Back to Subject</button>
  <div class="lesson-viewer"><div class="lesson-complete">
    <div style="font-size:56px;margin-bottom:12px">🎉</div>
    <h2>Lesson Complete!</h2>
    <p>${lv.lesTitle}</p>
    <div class="xp-gain">${alreadyDone?'Already earned XP':'+'+xpEarned+' XP'}</div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:8px">
      <button class="btn-secondary" onclick="backToSubject()">Back to Subject</button>
      <button class="btn-primary" onclick="nextLesson()">Next Lesson →</button>
    </div>
  </div></div>`;
}
function nextLesson(){
  const lv=state.lessonView;
  if(!lv)return backToSubject();
  const sub=SUBJECTS.find(s=>s.id===lv.subId);
  const topic=sub.topics.find(t=>t.id===lv.topId);
  if(lv.lesIdx+1<topic.lessons.length){
    openLesson(lv.subId,lv.topId,lv.lesIdx+1);
  } else {
    // Move to next topic
    const topIdx=sub.topics.findIndex(t=>t.id===lv.topId);
    if(topIdx+1<sub.topics.length){
      const nextTopic=sub.topics[topIdx+1];
      openLesson(lv.subId,nextTopic.id,0);
    } else {
      backToSubject();
    }
  }
}
function backToSubject(){state.lessonView=null;render();}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ============================================================
// TESTS
// ============================================================
function startTest(subId,testId){
  const sub=SUBJECTS.find(s=>s.id===subId);
  const test=sub.tests.find(t=>t.id===testId);
  state.test=test;
  state.testState={current:0,answers:[],selected:null,revealed:false,startTime:Date.now(),score:null};
  render();
}
function renderTest(){
  const t=state.test,ts=state.testState;
  if(ts.score!==null)return renderResults();
  const q=t.questions[ts.current];
  const labels=['A','B','C','D'];
  const pct=Math.round((ts.current/t.questions.length)*100);
  const elapsed=Math.floor((Date.now()-ts.startTime)/1000);
  const mins=Math.floor(elapsed/60).toString().padStart(2,'0');
  const secs=(elapsed%60).toString().padStart(2,'0');
  return`<button class="back-btn" onclick="closeTest()">← Exit Test</button>
  <div class="test-container">
    <div class="test-header"><div><div style="font-size:15px;font-weight:700;margin-bottom:2px">${t.title}</div><div class="test-progress">Q ${ts.current+1} / ${t.questions.length}</div></div><div class="timer">${mins}:${secs}</div></div>
    <div style="height:4px;background:var(--bg3);border-radius:4px;margin-bottom:22px;overflow:hidden"><div style="height:100%;background:var(--accent);border-radius:4px;width:${pct}%;transition:width 0.3s"></div></div>
    <div class="question-text">${q.q}</div>
    <div class="options">${q.opts.map((o,i)=>{let cls='option-btn';if(ts.revealed){if(i===q.ans)cls+=' correct';else if(i===ts.selected&&i!==q.ans)cls+=' wrong';}else if(i===ts.selected)cls+=' selected';return`<button class="${cls}" onclick="selectAnswer(${i})" ${ts.revealed?'disabled':''}><span class="opt-label">${labels[i]}</span>${o}</button>`;}).join('')}</div>
    ${ts.revealed?`<div class="feedback ${ts.selected===q.ans?'correct':'wrong'}">${ts.selected===q.ans?'✓ Correct! ':'✗ Incorrect. '}${q.exp}</div><button class="submit-btn" onclick="nextQuestion()">${ts.current+1<t.questions.length?'Next →':'View Results'}</button>`:`<button class="submit-btn" onclick="submitAnswer()" ${ts.selected===null?'disabled':''}>Submit Answer</button>`}
  </div>`;
}
function selectAnswer(i){if(state.testState.revealed)return;state.testState.selected=i;render();}
function submitAnswer(){const ts=state.testState;if(ts.selected===null)return;ts.revealed=true;ts.answers.push({q:ts.current,selected:ts.selected,correct:ts.selected===state.test.questions[ts.current].ans});render();}
function nextQuestion(){
  const ts=state.testState,t=state.test;
  if(ts.current+1>=t.questions.length){
    const correct=ts.answers.filter(a=>a.correct).length;
    const pct=Math.round(correct/t.questions.length*100);
    ts.score=pct;ts.elapsed=Math.floor((Date.now()-ts.startTime)/1000);
    const earnedXp=Math.round(t.xp*(pct/100));
    addLog('test',t.title,pct,earnedXp);
    saveState();
  }else{ts.current++;ts.selected=null;ts.revealed=false;}
  render();
}
function renderResults(){
  const ts=state.testState,t=state.test;
  const correct=ts.answers.filter(a=>a.correct).length;
  const pct=ts.score;
  const grade=pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
  const gc=pct>=80?'var(--accent3)':pct>=70?'var(--accent4)':'var(--accent2)';
  const mins=Math.floor(ts.elapsed/60),secs=ts.elapsed%60;
  return`<button class="back-btn" onclick="closeTest()">← Back to Subject</button>
  <div class="test-container"><div class="results">
    <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Test Complete</div>
    <div class="results-score" style="color:${gc}">${grade}</div>
    <div class="results-grade">${pct}% · ${correct}/${t.questions.length} correct</div>
    <div class="results-breakdown">
      <div class="result-item"><div class="result-val" style="color:${gc}">${pct}%</div><div class="result-lbl">Score</div></div>
      <div class="result-item"><div class="result-val" style="color:var(--accent4)">${mins}m ${secs}s</div><div class="result-lbl">Time</div></div>
      <div class="result-item"><div class="result-val" style="color:var(--accent)">${Math.round(t.xp*(pct/100))}</div><div class="result-lbl">XP Earned</div></div>
    </div>
    <div style="text-align:left;margin-bottom:16px"><div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:700;letter-spacing:0.5px">BREAKDOWN</div>
    ${ts.answers.map((a,i)=>{const q=t.questions[i];return`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:${a.correct?'var(--accent3)':'var(--accent2)'};font-weight:700;min-width:14px">${a.correct?'✓':'✗'}</span><span style="flex:1;color:var(--text2)">${q.q}</span></div>`;}).join('')}</div>
    <button class="submit-btn" onclick="closeTest()">Back to Subject</button>
  </div></div>`;
}
function closeTest(){state.test=null;state.testState=null;render();}

// ============================================================
// RANKS PAGE
// ============================================================
function renderRanks(){
  const rank=getRank(state.xp);
  const nextRank=getNextRank(state.xp);
  const xpIntoLevel=state.xp-rank.min;
  const levelSize=(rank.max===Infinity?1000:rank.max-rank.min)+1;
  const pct=Math.min(100,Math.round(xpIntoLevel/levelSize*100));
  return`
  <div style="margin-bottom:24px">
    <div style="font-family:var(--font-display);font-size:32px;margin-bottom:4px">Your Rank</div>
    <div style="color:var(--text2);font-size:14px">Earn XP by completing lessons and tests to level up!</div>
  </div>
  <div class="xp-bar-wrap" style="margin-bottom:28px">
    <div class="rank-icon" style="font-size:40px">${rank.icon}</div>
    <div class="xp-bar-info">
      <div class="xp-bar-top"><div class="rank-name" style="color:${rank.color};font-size:18px">${rank.name}</div><div class="xp-label">${state.xp} / ${rank.max===Infinity?'∞':rank.max} XP</div></div>
      <div class="xp-bar-track" style="height:10px"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
      <div class="xp-next">${nextRank?`${nextRank.min - state.xp} XP needed for ${nextRank.icon} ${nextRank.name}`:'🏆 Highest rank achieved!'}</div>
    </div>
  </div>
  <div class="section-title">All Ranks</div>
  <div class="ranks-grid">
    ${RANKS.map(r=>{
      const unlocked=state.xp>=r.min;
      const isCurrent=rank.name===r.name;
      return`<div class="rank-card ${isCurrent?'current':unlocked?'unlocked':'locked'}">
        <div class="rank-emoji">${r.icon}</div>
        <div class="rank-title" style="color:${r.color}">${r.name}</div>
        <div class="rank-req">${r.min}${r.max===Infinity?'+':' – '+r.max} XP</div>
        ${isCurrent?`<div class="rank-current-badge">Current Rank</div>`:''}
        ${unlocked&&!isCurrent?`<div style="font-size:11px;color:var(--accent3);margin-top:6px">✓ Unlocked</div>`:''}
        ${!unlocked?`<div style="font-size:11px;color:var(--text3);margin-top:6px">🔒 ${r.min - state.xp} XP away</div>`:''}
      </div>`;
    }).join('')}
  </div>
  <div class="section-title" style="margin-top:4px">How to Earn XP</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
    ${[['📖','Complete a lesson','10–25 XP'],['✏️','Correct quiz answer in lesson','5 XP'],['📝','Complete a test','Up to 300 XP (score-based)'],['🎯','Perfect test score','Full XP reward']].map(([icon,act,xp])=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;gap:10px;align-items:center"><span style="font-size:22px">${icon}</span><div><div style="font-size:13px;font-weight:600">${act}</div><div style="font-size:12px;color:var(--accent4)">${xp}</div></div></div>`).join('')}
  </div>`;
}

// ============================================================
// LOG
// ============================================================
function renderLog(){
  if(!state.log.length)return`<div class="empty-log">📋 No activity yet. Start studying to see your log!</div>`;
  return`<div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-family:var(--font-display);font-size:28px">Activity Log</div>
    <button class="btn-danger" onclick="clearLog()">Clear Log</button>
  </div>
  <div class="log-list">${state.log.map(l=>{const sc=l.score==null?'':(l.score>=80?'good':l.score>=60?'mid':'bad');return`<div class="log-entry"><div class="log-icon ${l.type}">${l.type==='test'?'📝':'📖'}</div><div class="log-body"><div class="log-title">${l.title}</div><div class="log-time">${fmtTime(l.time)} · +${l.xp} XP</div></div>${l.score!=null?`<div class="log-score ${sc}">${l.score}%</div>`:''}</div>`;}).join('')}</div>`;
}
function clearLog(){if(confirm('Clear your activity log?')){state.log=[];saveState();render();}}
function openSubject(id){state.subject=id;render();}

// ============================================================
// AI TUTOR
// ============================================================
async function askAI(){
  const input=document.getElementById('ai-q'),resp=document.getElementById('ai-resp');
  if(!input||!resp)return;
  const q=input.value.trim();if(!q)return;
  const sub=SUBJECTS.find(s=>s.id===state.subject);
  input.value='';
  resp.innerHTML='<div class="loading"><span></span><span></span><span></span></div>';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:`You are a warm, encouraging high school math tutor specializing in ${sub?sub.title:'math'}. Give clear, concise explanations with simple examples. Use line breaks for readability. Keep under 200 words. Use plain text (no markdown).`,messages:[{role:'user',content:q}]})});
    const d=await r.json();
    resp.innerHTML=(d.content?.[0]?.text||'Try asking again!').replace(/\n/g,'<br>');
  }catch(e){resp.innerHTML='AI tutor unavailable. Try again shortly!';}
}
async function askAILesson(){
  const input=document.getElementById('ai-q'),resp=document.getElementById('ai-resp');
  if(!input||!resp)return;
  const q=input.value.trim();if(!q)return;
  const lv=state.lessonView;
  input.value='';
  resp.innerHTML='<div class="loading"><span></span><span></span><span></span></div>';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:`You are a warm, encouraging high school math tutor. The student is currently studying: "${lv?lv.lesTitle:'math'}". Give clear, concise explanations. Work through problems step by step. Keep under 200 words. Use plain text (no markdown symbols).`,messages:[{role:'user',content:q}]})});
    const d=await r.json();
    resp.innerHTML=(d.content?.[0]?.text||'Try asking again!').replace(/\n/g,'<br>');
  }catch(e){resp.innerHTML='AI tutor unavailable. Try again shortly!';}
}

// ============================================================
// INIT
// ============================================================
loadState();
render();
updateNavXP();
</script>
</body>
